name: TurkishCEFR
options:
  bundleIdPrefix: com.esfandiari
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    VALID_ARCHS: "arm64 x86_64"

targets:
  TurkishCEFR:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TurkishCEFR
        excludes:
          - "Resources/**"
      - path: TurkishCEFR/Resources
        type: folder
        buildPhase: resources
    info:
      path: TurkishCEFR/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.esfandiari.TurkishCEFR
        PRODUCT_NAME: TurkishCEFR
        INFOPLIST_FILE: TurkishCEFR/Info.plist
        CODE_SIGN_ENTITLEMENTS: TurkishCEFR/TurkishCEFR.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
