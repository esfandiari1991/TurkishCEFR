name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep -E '^Xcode' || true
          # Prefer the newest Xcode available on the runner — required because
          # recent XcodeGen versions emit pbxproj format 77, which Xcode 15 cannot read.
          for candidate in \
              /Applications/Xcode_16.3.app \
              /Applications/Xcode_16.2.app \
              /Applications/Xcode_16.1.app \
              /Applications/Xcode_16.0.app \
              /Applications/Xcode_16.app \
              /Applications/Xcode_15.4.app \
              /Applications/Xcode_15.3.app \
              /Applications/Xcode_15.2.app; do
            if [ -d "$candidate" ]; then
              sudo xcode-select -s "$candidate"
              echo "Selected $candidate"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Fetch offline corpus (Tatoeba + Turkish frequency)
        run: python3 scripts/fetch_corpus.py

      - name: Install ffmpeg (for Piper → MP3 encoding)
        run: brew install ffmpeg

      - name: Generate offline Turkish audio (Piper free + ElevenLabs if key present)
        env:
          ELEVEN_LABS_API_KEY: ${{ secrets.ELEVEN_LABS_API_KEY }}
        run: python3 scripts/generate_tts.py || echo "TTS generation failed — continuing without offline audio"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (Release, universal arm64 + x86_64)
        run: |
          set -o pipefail
          xcodebuild \
            -project TurkishCEFR.xcodeproj \
            -scheme TurkishCEFR \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            VALID_ARCHS="arm64 x86_64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build
          # Verify universal binary
          APP_BIN="$(find build/Build/Products/Release -maxdepth 4 -path '*TurkishCEFR.app/Contents/MacOS/TurkishCEFR' | head -1)"
          if [ -n "$APP_BIN" ]; then
            echo "Binary architectures:"
            lipo -info "$APP_BIN" || file "$APP_BIN"
          fi

      - name: Locate built app
        id: locate
        run: |
          APP_PATH="$(find build/Build/Products/Release -maxdepth 2 -name 'TurkishCEFR.app' -type d | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::TurkishCEFR.app not found in build output"
            find build -maxdepth 5 -type d -name '*.app' || true
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          ls -la "$APP_PATH"
          echo "Size: $(du -sh "$APP_PATH" | cut -f1)"

      - name: Ad-hoc sign the app
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose=2 "$APP_PATH" || true

      - name: Zip the app
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          OUT_DIR="$(pwd)/dist"
          mkdir -p "$OUT_DIR"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_DIR/TurkishCEFR.zip"
          ls -la "$OUT_DIR"

      - name: Build lightweight .dmg (drag-to-/Applications)
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          OUT_DIR="$(pwd)/dist"
          mkdir -p "$OUT_DIR"
          bash scripts/build_dmg.sh "$APP_PATH" "$OUT_DIR/TurkishCEFR.dmg"

      - name: Build heavyweight .pkg installer (wizard)
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          OUT_DIR="$(pwd)/dist"
          mkdir -p "$OUT_DIR"
          bash scripts/build_pkg.sh "$APP_PATH" "$OUT_DIR/TurkishCEFR-Full.pkg"

      - name: Upload build artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: TurkishCEFR-macOS
          path: dist/TurkishCEFR.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurkishCEFR-dmg
          path: dist/TurkishCEFR.dmg
          if-no-files-found: warn
          retention-days: 90

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurkishCEFR-pkg
          path: dist/TurkishCEFR-Full.pkg
          if-no-files-found: warn
          retention-days: 90

      - name: Stage release assets
        run: |
          OUT_DIR="$(pwd)/dist"
          ls -la "$OUT_DIR"
          # Keep the list inline — softprops/action-gh-release doesn't
          # mind missing files as long as at least one exists.
          ls "$OUT_DIR"/TurkishCEFR.zip "$OUT_DIR"/TurkishCEFR.dmg "$OUT_DIR"/TurkishCEFR-Full.pkg 2>/dev/null || true

      - name: Publish Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TurkishCEFR.zip
            dist/TurkishCEFR.dmg
            dist/TurkishCEFR-Full.pkg
          draft: false
          generate_release_notes: true

      - name: Create / update "latest" pre-release (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest main build"
          prerelease: true
          files: |
            dist/TurkishCEFR.zip
            dist/TurkishCEFR.dmg
            dist/TurkishCEFR-Full.pkg
          body: |
            **Universal macOS build (Apple Silicon + Intel)** — requires macOS 14 Sonoma or later.

            ### Two ways to install — pick whichever you prefer

            **🟢 Option A · `TurkishCEFR.dmg` (double-click & launch — zero Terminal)**
            1. Download and double-click `TurkishCEFR.dmg`.
            2. In the window that opens, drag `TurkishCEFR.app` onto the `Applications` shortcut.
            3. Open Launchpad → click `TurkishCEFR`. Done.

            **🔵 Option B · `TurkishCEFR-Full.pkg` (guided wizard — everything preinstalled)**
            1. Download and double-click `TurkishCEFR-Full.pkg`.
            2. Follow the Welcome → License → Install → Done wizard.
            3. The installer automatically strips the Gatekeeper quarantine flag,
               so the app opens cleanly on first launch even on macOS Sequoia.

            **⚪ Option C · `TurkishCEFR.zip` (advanced, manual)**
            Unzip → drag `TurkishCEFR.app` to `/Applications`.
            If macOS refuses to open it, run in Terminal:
            ```
            xattr -dr com.apple.quarantine /Applications/TurkishCEFR.app
            ```
