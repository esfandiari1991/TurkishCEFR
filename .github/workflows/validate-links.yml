name: Validate YouTube links

# Weekly keep-alive for the curated "Watch & Learn" videos bundled in
# LessonResources.swift. Any video that returns non-200 from YouTube's
# public oEmbed endpoint lands in a GitHub issue so we (or the app's
# runtime `LinkHealthChecker` at install-time) can swap it for one of
# the pre-declared alternates.
on:
  schedule:
    # Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      - "TurkishCEFR/Data/Content/LessonResources.swift"
      - "scripts/validate_links.py"
      - ".github/workflows/validate-links.yml"

permissions:
  contents: read
  issues: write

jobs:
  validate:
    name: Ping every curated YouTube reference
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validator
        id: run
        continue-on-error: true
        run: python3 scripts/validate_links.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-validation-report
          path: link-validation-report.json
          if-no-files-found: warn

      - name: Open tracking issue if anything is broken
        if: steps.run.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('link-validation-report.json', 'utf-8'));
            if (!report.broken) { return; }
            const title = `🔗 ${report.broken} curated YouTube link(s) are broken`;
            const lines = report.broken_refs.map(r =>
              `- [${r.status}] \`${r.id}\` — "${r.title}" (${r.channel})`).join('\n');
            const body = [
              `The weekly link-validator found broken YouTube references in`,
              "`TurkishCEFR/Data/Content/LessonResources.swift`:",
              "",
              lines,
              "",
              "### How to fix",
              "1. Open `TurkishCEFR/Data/Content/LessonResources.swift`",
              "2. Replace each broken `VideoRef` with one of the `alternates`",
              "   declared in the same bundle, or add a fresh one you've",
              "   verified works.",
              "3. Push the fix — this workflow will close out the issue on",
              "   the next weekly run.",
              "",
              "_Auto-generated by `.github/workflows/validate-links.yml`._",
            ].join('\n');

            // De-dupe: if we already have an open issue with the same
            // title, edit it in place instead of opening a new one.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'link-rot',
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['link-rot'],
              });
            }

      - name: Re-raise validator exit code
        if: steps.run.outcome == 'failure'
        run: exit 1
